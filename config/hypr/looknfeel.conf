# Change the default Omarchy look'n'feel

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 4
    gaps_out = 4
    border_size = 1

    # Use master layout instead of dwindle
    # layout = master

    # Resize windows by clicking and dragging on borders/gaps
    resize_on_border = true
    extend_border_grab_area = 30
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    # Use round window corners
    rounding = 6

    blur {
        enabled = false
    }

    shadow {
        enabled = true
        range = 12
        render_power = 2
        color = rgba(88c0d060)
        color_inactive = rgba(2e344040)
    }
}

# https://wiki.hypr.land/Configuring/Variables/#layout
layout {
    # Avoid overly wide single-window layouts on wide screens
    # single_window_aspect_ratio = 1 1
}











# Custom animations from NixOS config
animations {
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    # Windows pop in instead of sliding
    animation = windows,             1, 5, myBezier, popin 80%
    animation = windowsOut,          1, 5, myBezier, popin 80%

    # Fade for layer surfaces (waybar, walker, etc.)
    animation = layers,              1, 5, myBezier, fade
    animation = layersIn,            1, 5, myBezier, fade
    animation = layersOut,           1, 5, myBezier, fade
    animation = fade,                1, 5, myBezier

    # Workspace slide (enabled — disabled by Omarchy default)
    animation = workspaces,          1, 5, myBezier, slide

    # Special workspaces fade instead of sliding vertically
    animation = specialWorkspaceIn,  1, 5, myBezier, fade
    animation = specialWorkspaceOut, 1, 5, myBezier, fade
}

# === a-la-carchy hyprland settings ===
decoration {
    active_opacity = 0.9
    inactive_opacity = 0.75
}
# === end a-la-carchy hyprland settings ===
