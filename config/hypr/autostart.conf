# Autostart — programs launched with Hyprland

# Status bar
exec-once = waybar

# Notifications
exec-once = mako

# App launcher daemon (avoids "waiting for elephant" on first open)
exec-once = walker --daemon

# Wallpaper (swww provides smooth transitions)
exec-once = swww-daemon
exec-once = sleep 0.5 && swww img "$HOME/.config/hypr/wallpapers/wallhaven-nzmmjg.jpg" --transition-type fade --transition-duration 2

# Clipboard manager
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Idle daemon (dims/locks after inactivity)
exec-once = hypridle

# SwayOSD server (for Caps Lock / volume OSD)
exec-once = swayosd-server

# Polkit agent (for privilege prompts)
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
