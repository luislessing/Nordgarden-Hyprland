# Window rules

# Nautilus — always floating, centered, reasonable size
windowrule = float on,      match:class org.gnome.Nautilus
windowrule = center on,     match:class org.gnome.Nautilus
windowrule = size 1200 800, match:class org.gnome.Nautilus

# Picture-in-picture
windowrule = float on,  match:title ^(Picture-in-Picture)$
windowrule = pin on,    match:title ^(Picture-in-Picture)$

# 1Password quick-access
windowrule = float on,  match:class com.1password.1password
windowrule = center on, match:class com.1password.1password
