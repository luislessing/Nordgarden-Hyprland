# Utilities: screenshots, lock, launcher, OSD

# App launcher (walker)
bind = SUPER, D, exec, walker

# Screen lock
bind = SUPER SHIFT, L, exec, hyprlock

# Screenshots (grim + slurp)
bind = , Print,            exec, grim -g "$(slurp)" - | wl-copy
bind = SUPER, Print,       exec, grim "$HOME/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png"
bind = SUPER SHIFT, Print, exec, grim -g "$(slurp)" "$HOME/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png"

# Display rotation (cycles: normal → 90°CW → 180° → 90°CCW)
bind = SUPER SHIFT, R, exec, ~/.config/hypr/scripts/rotate-display

# Caps Lock OSD
bindl = , Caps_Lock, exec, sleep 0.1 && swayosd-client --caps-lock
