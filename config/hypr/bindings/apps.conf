# Application bindings

# Terminal (opens in CWD of active window)
bindd = SUPER, RETURN,         Terminal,       exec, kitty --directory="$($HOME/.config/hypr/scripts/terminal-cwd)"
bindd = SUPER ALT, RETURN,     Tmux,           exec, kitty --directory="$($HOME/.config/hypr/scripts/terminal-cwd)" tmux new

# File manager
bindd = SUPER SHIFT, F,        File manager,   exec, nautilus --new-window
bindd = SUPER ALT SHIFT, F,    File manager CWD, exec, nautilus --new-window "$($HOME/.config/hypr/scripts/terminal-cwd)"

# Browser
bindd = SUPER SHIFT, B,        Browser,        exec, firefox
bindd = SUPER SHIFT ALT, B,    Browser private, exec, firefox --private-window

# Music
bindd = SUPER SHIFT, M,        Music,          exec, $HOME/.config/hypr/scripts/launch-or-focus Spotify spotify-launcher

# Editor (Neovim in Kitty)
bindd = SUPER SHIFT, N,        Editor,         exec, kitty nvim

# Docker TUI
bindd = SUPER SHIFT, D,        Docker,         exec, kitty lazydocker

# Messaging
bindd = SUPER SHIFT, G,        Signal,         exec, $HOME/.config/hypr/scripts/launch-or-focus signal signal-desktop

# Notes
bindd = SUPER SHIFT, O,        Obsidian,       exec, $HOME/.config/hypr/scripts/launch-or-focus obsidian "obsidian --disable-gpu --enable-wayland-ime"
bindd = SUPER SHIFT, W,        Marktext,       exec, ~/marktext.AppImage --enable-wayland-ime

# Passwords
bindd = SUPER SHIFT, SLASH,    Passwords,      exec, 1password

# Communication
bindd = SUPER SHIFT, T,        Teams,          exec, teams-for-linux

# Caps Lock OSD
bindl = , Caps_Lock, exec, sleep 0.1 && swayosd-client --caps-lock
